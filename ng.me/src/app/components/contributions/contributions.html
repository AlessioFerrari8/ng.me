<!-- GitHub Contributions Heatmap Component -->
<div class="w-full bg-slate-900/40 border border-slate-700/50 rounded-xl p-8">
  <!-- Header Section -->
  <div class="mb-8">
    <h3 class="text-2xl md:text-3xl font-bold text-slate-100 mb-2">Contribution Activity</h3>
    <p class="text-slate-400 text-sm">
      <span *ngIf="!loading" class="text-emerald-400 font-semibold">{{ totalContributions }} repositories</span>
      <span *ngIf="loading" class="text-slate-500">Loading...</span>
    </p>
  </div>

  <!-- Heatmap Section -->
  <div *ngIf="!loading" class="overflow-x-auto pb-4">
    <!-- Contribution Grid -->
    <div class="flex gap-1 min-w-max">
      <div *ngFor="let week of weeks" class="flex flex-col gap-1">
        <div 
          *ngFor="let day of week" 
          class="w-3 h-3 rounded transition-all duration-200 cursor-pointer hover:scale-125 hover:shadow-lg"
          [style.backgroundColor]="day.color"
          [title]="day.date + ': ' + day.count + ' contributions'"
        ></div>
      </div>
    </div>
  </div>

  <!-- Loading State -->
  <div *ngIf="loading" class="text-center py-12">
    <p class="text-slate-400 text-sm">Loading contribution history...</p>
    <div class="mt-4 flex justify-center gap-1">
      <div class="w-2 h-2 bg-slate-600 rounded-full animate-pulse"></div>
      <div class="w-2 h-2 bg-slate-600 rounded-full animate-pulse" style="animation-delay: 0.2s"></div>
      <div class="w-2 h-2 bg-slate-600 rounded-full animate-pulse" style="animation-delay: 0.4s"></div>
    </div>
  </div>

  <!-- Legend -->
  <div *ngIf="!loading" class="mt-6 pt-6 border-t border-slate-700/30 flex items-center gap-4 text-xs text-slate-400">
    <span>Less</span>
    <div class="flex gap-1">
      <div class="w-3 h-3 rounded" style="background-color: #444c63"></div>
      <div class="w-3 h-3 rounded" style="background-color: #0e4429"></div>
      <div class="w-3 h-3 rounded" style="background-color: #006d32"></div>
      <div class="w-3 h-3 rounded" style="background-color: #26a641"></div>
      <div class="w-3 h-3 rounded" style="background-color: #39d353"></div>
    </div>
    <span>More</span>
  </div>
</div>
